pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: bunx oxlint
    fmt:
      glob: "*.{ts,tsx,js,jsx}"
      run: just fmt && git add {staged_files}
      stage_fixed: true

pre-push:
  commands:
    clippy:
      run: cargo clippy --workspace --all-targets -- -D warnings
