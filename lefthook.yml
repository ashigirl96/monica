pre-commit:
  parallel: true
  commands:
    lint:
      run: bunx oxlint
    fmt-check:
      run: bunx oxfmt --check
    db-validate:
      glob: "crates/monica-infra/src/sqlite/{schema.sql,migrations/*}"
      run: just db-validate

pre-push:
  commands:
    clippy:
      run: cargo clippy --workspace --all-targets -- -D warnings
