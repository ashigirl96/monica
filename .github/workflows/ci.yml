name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: extractions/setup-just@v4
      - run: bun install --frozen-lockfile
      - run: bunx oxlint
      - run: bunx oxfmt --check
      - run: bunx knip
      - name: Check unused Tauri commands
        run: just unused-commands

  build:
    name: tauri build (macos)
    needs: lint
    # Temporarily disable the macOS Tauri build for pull requests.
    if: github.event_name != 'pull_request'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - run: bun install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_APP_PATH: crates/monica-desktop

      - name: Report bundle size
        if: always()
        shell: bash
        run: |
          echo "=== dist/ size ==="
          du -sh dist 2>/dev/null || true
          echo "=== Tauri bundle ==="
          ls -lhR target/release/bundle 2>/dev/null || true
