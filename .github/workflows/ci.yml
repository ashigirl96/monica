name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx oxlint
      - run: bunx oxfmt --check
      - run: bunx knip
      - name: Check unused Tauri commands
        shell: bash
        run: |
          bindings="src/commands/bindings.ts"
          cmds=$(sed -n '/^export const commands/,/^};/p' "$bindings" | grep -oE '^\s+[a-zA-Z]+:' | sed 's/[: ]//g')
          found=0
          for cmd in $cmds; do
            if ! grep -rq "commands\.$cmd" src/ --include='*.ts' --include='*.tsx' --exclude="$bindings"; then
              echo "unused command: $cmd"
              found=1
            fi
          done
          if [ "$found" -eq 0 ]; then echo "all commands used"; fi
          exit "$found"

  build:
    name: tauri build (macos)
    needs: lint
    # Temporarily disable the macOS Tauri build for pull requests.
    if: github.event_name != 'pull_request'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - run: bun install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_APP_PATH: crates/monica-app

      - name: Report bundle size
        if: always()
        shell: bash
        run: |
          echo "=== dist/ size ==="
          du -sh dist 2>/dev/null || true
          echo "=== Tauri bundle ==="
          ls -lhR target/release/bundle 2>/dev/null || true
