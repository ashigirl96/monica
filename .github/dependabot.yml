version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      all:
        patterns:
          - "*"
        update-types:
          - patch
          - minor
          - major

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      all:
        patterns:
          - "*"
        update-types:
          - patch
          - minor
          - major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      all:
        patterns:
          - "*"
        update-types:
          - patch
          - minor
          - major
