[package]
name = "monica-cli"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "monica"
path = "src/main.rs"

[dependencies]
monica-core = { path = "../monica-core" }
clap = { version = "4", features = ["derive"] }
anyhow = "1.0.102"
serde = { version = "1.0.228", default-features = false, features = ["derive"] }
serde_json = { version = "1.0.150", default-features = false, features = ["std"] }
